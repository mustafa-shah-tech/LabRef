<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0c">
    <title>LabRef - Medical Lab Test Reference Ranges</title>
    <!-- Favicon - Flask/Lab emoji as SVG favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">
    <!-- Fallback for older browsers -->
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <!-- Apple touch icon for iOS home screen -->
    <link rel="apple-touch-icon" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="flask-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 2v7.31"></path>
                        <path d="M14 9.3V1.99"></path>
                        <path d="M8.5 2h7"></path>
                        <path d="M14 9.3a6.5 6.5 0 1 1-4 0"></path>
                        <path d="M5.52 16h12.96"></path>
                    </svg>
                    <div>
                        <h1>LabRef</h1>
                        <p class="subtitle">Medical Lab Test Reference Ranges</p>
                    </div>
                </div>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <main>
            <section class="search-section">
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" inputmode="search" autocomplete="off" autocorrect="off"
                        autocapitalize="off" spellcheck="false" placeholder="Search test name e.g. Hemoglobin, TSH...">
                </div>
            </section>

            <section class="filter-section">
                <div class="filters-container" id="categoryFilters">
                    <button class="filter-btn active" data-category="All">All</button>
                    <button class="filter-btn" data-category="Hematology">Hematology</button>
                    <button class="filter-btn" data-category="Biochemistry">Biochemistry</button>
                    <button class="filter-btn" data-category="Liver">Liver</button>
                    <button class="filter-btn" data-category="Kidney">Kidney</button>
                    <button class="filter-btn" data-category="Thyroid">Thyroid</button>
                </div>
            </section>

            <section class="results-section" id="results">
                <div class="results-header">
                    <p id="resultsCount">Showing 30 of 30 tests</p>
                </div>

                <div id="cardsGrid" class="cards-grid">
                    <!-- Cards will be populated here by JS -->
                </div>

                <div id="emptyState" class="empty-state hidden">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <h2>No tests found</h2>
                    <p>We couldn't find any lab tests matching your search criteria.</p>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Built by Mustafa Shah</p>
            <p class="disclaimer">Data is for reference only. Always consult a qualified medical professional.</p>
        </footer>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
